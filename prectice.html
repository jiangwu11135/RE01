<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box1{color:dodgerblue;}
        .box2{color: darkkhaki;}
        .box3{color: red;}
        .box4{color: darkgrey;}
    </style>
</head>
<body>
    <div>
    <img src=".//MEITU_20260315_004712018.jpg" alt="" height="800px">
    </div>
    <audio autoplay="autoplay" loop="" src="./em0wu-o0sf4.mp3" type="audio/mp3"></audio>
    <h1 class="box1">一对笑面虎，两头乌角鲨</h1>
    <h3 class="box2">世人昨日看错我曹操</h3>
    <p class="box1">今日又看<strong>错</strong>了</p>
    <h2 class="box3">生死不明，那就是死了</h2>
    <h3 class="box2">咱家不怕酸，不怕</h3>
    <h2 class="box1">主公有两把剑， 一把是<b>仁之剑</b>，一把是<b>义之剑</b></h2>
    <h1 class="box3">竟然不许</h1>
     <form action="#">
        <label>名称：</label>
        <input type="text" placeholder="说吾名，吓汝一跳" id="username">
        <br><br>
        <label>爱好：</label>
        <span class="box4">
            <input type="checkbox" value="A" name="hobby" id="hobby1">
            <label for="hobby1">喝酒</label>
            <input type="checkbox" value="B" name="hobby" id="hobby2">
            <label for="hobby2">斗蛐蛐</label>
           
            <input type="checkbox" value="C" name="hobby" id="hobby3">
            <label for="hobby3">称帝</label>
            
            <input type="checkbox" value="D" name="hobby" id="hobby4">
            <label for="hobby4">自刎归天</label>
        </span>
        <br><br>
        <button type="button" onclick="showMsg()">广而告之</button>
    </form>

    <div id="resultBox" class="result">
        <div id="sentences"></div>
    </div>

   <script>
        // 定义每个选项对应的固定短句
        const fixedSentences = {
            'A': "喜好喝酒，当浮一大白",
            'B': "那些蛐蛐个个都有情有义",
            'C': "啊，恭喜您可以称帝了",
            'D': "听令，自刎归天"
        };

        function showMsg() {
            const nameInput = document.getElementById('username');
            const checkboxes = document.querySelectorAll('input[name="hobby"]:checked');
            const resultBox = document.getElementById('resultBox');
            const sentencesDiv = document.getElementById('sentences');
            
            // 获取姓名
            let name = nameInput.value.trim();
            if (name === '') {
                name = '列为诸公';
            }
            
            // 获取选中的选项
            let selectedOptions = [];
            checkboxes.forEach(checkbox => {
                selectedOptions.push(checkbox.value);
            });
            
            // 清空之前的句子
            sentencesDiv.innerHTML = '';
            
            // 为每个选中的选项生成固定的短句
            selectedOptions.forEach(option => {
                if (fixedSentences[option]) {
                    const sentenceDiv = document.createElement('div');
                    sentenceDiv.className = 'sentence';
                    sentenceDiv.innerHTML = `<strong>${name}</strong> ${fixedSentences[option]}`;
                    sentencesDiv.appendChild(sentenceDiv);
                }
            });
            
            // 如果没有选中任何选项，显示默认提示
            if (selectedOptions.length === 0) {
                const defaultSentence = document.createElement('div');
                defaultSentence.className = 'sentence';
                defaultSentence.innerHTML = `<strong>${name}</strong> 真是个神人啊`;
                sentencesDiv.appendChild(defaultSentence);
            }
            
            // 显示结果框
            resultBox.classList.add('show');
        }
        
        
        // 为复选框添加点击事件，实时更新
        document.querySelectorAll('input[name="hobby"]').forEach(checkbox => {
            checkbox.addEventListener('change', function() {
                if (this.checked) {
                    this.parentNode.style.color = '#4CAF50';
                } else {
                    this.parentNode.style.color = '';
                }
            });
        });
    </script>

</body>
</html>
